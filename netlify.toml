[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

# Relance quotidienne des retards de paiement (07:00 UTC = 07:00 à Abidjan/GMT).
[functions."notify-overdue"]
  schedule = "0 7 * * *"

# Génération quotidienne des factures d'abonnement (06:00 UTC).
[functions."generate-recurrences"]
  schedule = "0 6 * * *"

# SPA : toutes les routes applicatives servent index.html (routing côté client).
# La fonction et les assets statiques sont servis avant ce repli.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# En-têtes de sécurité de base.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
