[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

# SPA : toutes les routes applicatives servent index.html (routing côté client).
# La fonction et les assets statiques sont servis avant ce repli.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# En-têtes de sécurité de base.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
